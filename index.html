<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB Viewer</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header id="header">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l9 5v10l-9 5-9-5V7l9-5z"/>
          <path d="M3 7l9 5 9-5"/>
          <path d="M12 12v10"/>
        </svg>
      </div>
      <div class="title">
        <h1>GLB Viewer</h1>
        <span>Model + Animation</span>
      </div>
    </div>
  </header>

  <main id="main">
    <div id="stage">
      <canvas id="canvas"></canvas>

      <div id="drop-zone">
        <div class="drop-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <h2>Перетащите модель</h2>
          <p>GLB или GLTF — потом загрузите анимацию справа</p>
          <input type="file" id="file-input" accept=".glb,.gltf" hidden>
        </div>
      </div>

      <div id="anim-panel" class="overlay-panel hidden">
        <div class="panel-head">
          <span>Анимации</span>
          <div class="play-controls">
            <button id="btn-play" type="button" title="Play" class="active">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
            </button>
            <button id="btn-pause" type="button" title="Pause">
              <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
            </button>
          </div>
        </div>
        <div id="anim-list"></div>
        <div class="timeline-row">
          <input type="range" id="timeline" min="0" max="100" step="1" value="0">
          <div class="time-display">
            <span id="time-cur">0</span> / <span id="time-total">0</span> fr
          </div>
        </div>
        <div class="speed-row">
          <label for="speed">Скорость</label>
          <input type="range" id="speed" min="0.05" max="10" step="0.05" value="1">
          <span id="speed-val">1.00×</span>
        </div>
      </div>

      <div id="display-panel" class="overlay-panel">
        <button data-mode="mesh" class="active">Mesh</button>
        <button data-mode="wireframe">Wire</button>
        <button data-mode="skeleton">Skeleton</button>
      </div>

      <div id="hint">ЛКМ — вращать · ПКМ — пан · Колесо — зум</div>
    </div>

    <aside id="sidebar">
      <section class="side-panel">
        <header class="side-head">
          <span class="dot dot-model"></span>
          <h2>Модель</h2>
          <span class="badge" id="model-count">0</span>
          <button class="side-clear hidden" id="model-clear" title="Удалить">×</button>
        </header>
        <div class="side-drop" id="model-drop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2l9 5v10l-9 5-9-5V7l9-5z"/>
            <path d="M3 7l9 5 9-5M12 12v10"/>
          </svg>
          <p>Перетащите GLB модель</p>
          <span>или нажмите</span>
          <input type="file" id="model-input" accept=".glb,.gltf" hidden>
        </div>
        <div class="side-hier hidden" id="model-hier"></div>
        <div class="side-info hidden" id="model-info">
          <span class="fname" id="model-fname"></span>
          <span class="fsize" id="model-fsize"></span>
        </div>
      </section>

      <section class="side-panel">
        <header class="side-head">
          <span class="dot dot-anim"></span>
          <h2>Анимация</h2>
          <span class="badge" id="anim-count">0</span>
          <button class="side-clear hidden" id="anim-clear" title="Удалить">×</button>
        </header>
        <div class="side-drop" id="anim-drop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="5 3 19 12 5 21 5 3"/>
          </svg>
          <p>Перетащите GLB с анимацией</p>
          <span>применится по именам костей</span>
          <input type="file" id="anim-input" accept=".glb,.gltf" hidden>
        </div>
        <div class="side-hier hidden" id="anim-hier"></div>
        <div class="side-info hidden" id="anim-info">
          <span class="fname" id="anim-fname"></span>
          <span class="fsize" id="anim-fsize"></span>
        </div>
      </section>
    </aside>
  </main>

  <script type="module" src="viewer.js"></script>
</body>
</html>
